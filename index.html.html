<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEYMAR JR | O Jogo Continua</title>
  <link rel="stylesheet" href="website.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Custom Cursor -->
  <div class="cursor" id="customCursor"></div>

  <!-- Hero Section -->
  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="neymar-title">NEYMAR JR</h1>
      <p class="tagline">The Magician • The King of Dribble</p>
      <button class="cta-btn" onclick="document.getElementById('model-section').scrollIntoView({behavior: 'smooth'})">
        Experience 3D Neymar
      </button>
    </div>
  </header>

  <!-- 3D Model Section -->
  <section id="model-section" class="model-section">
    <div class="container">
      <h2 class="section-title">3D NEYMAR MODEL</h2>
      <div class="three-container" id="threeContainer"></div>
      <p class="model-info">Drag to rotate • Scroll to zoom • Free public model loaded via Three.js</p>
    </div>
  </section>

  <!-- Stats -->
  <section class="stats-section">
    <div class="container stats-grid">
      <div class="stat-card">
        <h3>Goals</h3>
        <div class="stat-number" data-target="450">0</div>
      </div>
      <div class="stat-card">
        <h3>Assists</h3>
        <div class="stat-number" data-target="320">0</div>
      </div>
      <div class="stat-card">
        <h3>Matches</h3>
        <div class="stat-number" data-target="650">0</div>
      </div>
      <div class="stat-card">
        <h3>Speed (km/h)</h3>
        <div class="stat-number" data-target="37">0</div>
      </div>
    </div>
  </section>

  <!-- Gallery -->
  <section class="gallery-section">
    <div class="container">
      <h2 class="section-title">ICONIC MOMENTS</h2>
      <div class="gallery-grid">
        <div class="gallery-item"><img src="https://source.unsplash.com/random/600x400/?neymar" alt="Neymar skill"></div>
        <div class="gallery-item"><img src="https://source.unsplash.com/random/600x400/?neymar2" alt="Neymar goal"></div>
        <div class="gallery-item"><img src="https://source.unsplash.com/random/600x400/?neymar3" alt="Neymar celebration"></div>
      </div>
    </div>
  </section>

  <footer>
    <p>Made with ❤️ for Neymar fans • Built with HTML + CSS + Three.js</p>
  </footer>

  <script src="website.js"></script>
</body>
</html>
